<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result | MediSure AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#07141f;
            color:white;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        .navbar{
            width:100%;
            padding:20px 8%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#0d1b2a;
            border-bottom:1px solid #16324f;
        }

        .logo{
            font-size:28px;
            font-weight:700;
            color:#4da3ff;
        }

        .developer{
            color:#b0c4de;
            font-size:14px;
        }

        .result-container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .result-card{
            width:100%;
            max-width:700px;
            background:#102033;
            border-radius:20px;
            padding:50px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.3);
        }

        .result-card h1{
            font-size:38px;
            margin-bottom:10px;
        }

        .subtitle{
            color:#b0c4de;
            margin-bottom:35px;
        }

        .prediction-box{
            background:#0d1b2a;
            padding:30px;
            border-radius:15px;
            margin-bottom:30px;
        }

        .prediction-label{
            color:#4da3ff;
            font-size:18px;
            margin-bottom:15px;
        }

        .prediction-value{
            color:#00ff95;
            font-size:48px;
            font-weight:700;
            word-wrap:break-word;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            padding:15px 35px;
            border-radius:12px;
            background:linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;
            font-weight:600;
            transition:0.3s;
        }

        .btn:hover{
            opacity:0.9;
            transform:translateY(-2px);
        }

        footer{
            text-align:center;
            padding:25px;
            background:#0d1b2a;
            color:#b0c4de;
        }

        @media(max-width:768px){

            .result-card{
                padding:30px;
            }

            .prediction-value{
                font-size:32px;
            }

            .result-card h1{
                font-size:28px;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">🩺 MediSure AI</div>
        <div class="developer">Developed by Hriday Sharma</div>
    </div>

    <div class="result-container">

        <div class="result-card">

            <h1>Prediction Complete</h1>

            <p class="subtitle">
                AI-powered estimate of the customer's health insurance cost
            </p>

            <div class="prediction-box">

                <div class="prediction-label">
                    Predicted Insurance Cost
                </div>

                <div class="prediction-value">
                    {{pred}}
                </div>

            </div>

            <a href="/" class="btn">
                Calculate Again
            </a>

        </div>

    </div>

    <footer>
        <h3>Medical Insurance Cost Prediction System</h3>
        <p>BCA Major Project • Amity University</p>
        <p>Developed by Hriday Sharma</p>
    </footer>

</body>
</html>
